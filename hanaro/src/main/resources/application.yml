spring:
  application:
    name: hanaro
  config:
    import: classpath:security.yml

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

    show-sql: true
    defer-datasource-initialization: false

    properties:
      hibernate:
        jdbc:
          batch_size: 50
          time_zone: Asia/Seoul
        order_inserts: true
        order_updates: true
        format_sql: true
        use_sql_comments: true

  sql:
    init:
      mode: never

  web:
    resources:
      add-mappings: false

  servlet:
    multipart:
      location: src/main/resources/static/tmp
      max-request-size: 10MB
      max-file-size: 2MB

upload:
  path: src/main/resources/static/upload
  secure: src/main/upload/secure

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger.html
  api-docs:
    enabled: true
    path: /hana8/api-docs
